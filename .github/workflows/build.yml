name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout assets
        uses: actions/checkout@v4
        with:
          repository: psyclimb/boneglaive-assets
          ssh-key: ${{ secrets.ASSETS_DEPLOY_KEY }}
          path: boneglaive-assets

      - name: Copy assets into place
        run: |
          cp -r boneglaive-assets/sounds sounds
          cp -r boneglaive-assets/graphics graphics

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository1.0-dev \
            pkg-config \
            python3-dev \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pygame cairosvg cairocffi pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller boneglaive.spec --distpath dist/linux

      - name: Package artifact
        run: |
          cd dist/linux
          zip -r ../../boneglaive-v1.1-linux.zip boneglaive/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boneglaive-linux
          path: boneglaive-v1.1-linux.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    env:
      # Make mingw64 DLLs visible to every step in this job
      MINGW64_BIN: C:\msys64\mingw64\bin
    steps:
      - uses: actions/checkout@v4

      - name: Checkout assets
        uses: actions/checkout@v4
        with:
          repository: psyclimb/boneglaive-assets
          ssh-key: ${{ secrets.ASSETS_DEPLOY_KEY }}
          path: boneglaive-assets

      - name: Copy assets into place
        run: |
          Copy-Item -Recurse boneglaive-assets\sounds sounds
          Copy-Item -Recurse boneglaive-assets\graphics graphics

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cairo via pre-installed MSYS2
        # windows-latest has MSYS2 pre-installed at C:\msys64
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed mingw-w64-x86_64-cairo mingw-w64-x86_64-fontconfig mingw-w64-x86_64-freetype mingw-w64-x86_64-harfbuzz mingw-w64-x86_64-glib2 mingw-w64-x86_64-pkg-config

      - name: Verify Cairo DLLs are present
        run: |
          $env:PATH = "$env:PATH;${{ env.MINGW64_BIN }}"
          $dlls = @(
            'libcairo-2.dll', 'libpixman-1-0.dll', 'libfontconfig-1.dll',
            'libfreetype-6.dll', 'libpng16-16.dll', 'zlib1.dll'
          )
          $missing = @()
          foreach ($dll in $dlls) {
            $path = "${{ env.MINGW64_BIN }}\$dll"
            if (Test-Path $path) {
              Write-Host "OK: $dll"
            } else {
              $missing += $dll
              Write-Host "MISSING: $dll"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing Cairo DLLs: $($missing -join ', ')"
            exit 1
          }

      - name: Install Python dependencies
        run: |
          $env:PATH = "$env:PATH;${{ env.MINGW64_BIN }}"
          python -m pip install --upgrade pip
          python -m pip install pygame cairosvg cairocffi pyinstaller
          python -m pip install -e .
          # Confirm packages are visible to the exact Python being used
          python -m pip show cairocffi cairosvg pygame pyinstaller

      - name: Verify cairocffi can load Cairo
        run: |
          $env:PATH = "$env:PATH;${{ env.MINGW64_BIN }}"
          python -c "import cairocffi; print('cairocffi OK:', cairocffi.cairo_version_string())"

      - name: Verify cairosvg works end-to-end
        run: |
          $env:PATH = "$env:PATH;${{ env.MINGW64_BIN }}"
          python -c "
          import cairosvg, sys
          result = cairosvg.svg2png(bytestring=b'<svg xmlns=""http://www.w3.org/2000/svg"" width=""2"" height=""2""><rect width=""2"" height=""2"" fill=""red""/></svg>', output_width=2, output_height=2)
          assert len(result) > 0, 'cairosvg produced empty output'
          print('cairosvg OK, output bytes:', len(result))
          "

      - name: Build with PyInstaller
        run: |
          $env:PATH = "$env:PATH;${{ env.MINGW64_BIN }}"
          pyinstaller boneglaive.spec --distpath dist\windows

      - name: Verify Cairo DLLs were bundled
        run: |
          $bundleDir = "dist\windows\boneglaive\_internal"
          $required = @('libcairo-2.dll', 'libpixman-1-0.dll', 'libfreetype-6.dll')
          $missing = @()
          foreach ($dll in $required) {
            if (Test-Path "$bundleDir\$dll") {
              Write-Host "Bundled OK: $dll"
            } else {
              $missing += $dll
              Write-Host "NOT BUNDLED: $dll"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Cairo DLLs missing from bundle: $($missing -join ', ')"
            exit 1
          }

      - name: Package artifact
        run: |
          Compress-Archive -Path dist\windows\boneglaive\* -DestinationPath boneglaive-v1.1-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boneglaive-windows
          path: boneglaive-v1.1-windows.zip

  release:
    name: Attach to Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            boneglaive-linux/boneglaive-v1.1-linux.zip
            boneglaive-windows/boneglaive-v1.1-windows.zip
