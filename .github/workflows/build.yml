name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository1.0-dev \
            pkg-config \
            python3-dev \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pygame cairosvg cairocffi pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller boneglaive.spec --distpath dist/linux

      - name: Package artifact
        run: |
          cd dist/linux
          zip -r ../../boneglaive-linux.zip boneglaive/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boneglaive-linux
          path: boneglaive-linux.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cairo via pre-installed MSYS2
        # windows-latest has MSYS2 pre-installed at C:\msys64
        # Use pacman directly — faster and more reliable than setup-msys2 action
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed mingw-w64-x86_64-cairo mingw-w64-x86_64-fontconfig mingw-w64-x86_64-freetype mingw-w64-x86_64-harfbuzz mingw-w64-x86_64-glib2 mingw-w64-x86_64-pkg-config

      - name: Add MSYS2 MinGW64 to PATH
        run: |
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Cairo DLLs are present
        run: |
          $dlls = @(
            'libcairo-2.dll', 'libpixman-1-0.dll', 'libfontconfig-1.dll',
            'libfreetype-6.dll', 'libpng16-16.dll', 'zlib1.dll'
          )
          $missing = @()
          foreach ($dll in $dlls) {
            $path = "C:\msys64\mingw64\bin\$dll"
            if (Test-Path $path) {
              Write-Host "OK: $dll"
            } else {
              $missing += $dll
              Write-Host "MISSING: $dll"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing Cairo DLLs: $($missing -join ', ')"
            exit 1
          }

      - name: Install Python dependencies
        # PATH now includes C:\msys64\mingw64\bin so cairocffi finds libcairo at install time
        run: |
          pip install --upgrade pip
          pip install pygame cairosvg cairocffi pyinstaller
          pip install -e .

      - name: Verify cairocffi can load Cairo
        run: |
          python -c "import cairocffi; print('cairocffi OK:', cairocffi.cairo_version_string())"

      - name: Verify cairosvg works end-to-end
        run: |
          python -c "
          import cairosvg, sys
          result = cairosvg.svg2png(bytestring=b'<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"2\" height=\"2\"><rect width=\"2\" height=\"2\" fill=\"red\"/></svg>', output_width=2, output_height=2)
          assert len(result) > 0, 'cairosvg produced empty output'
          print('cairosvg OK, output bytes:', len(result))
          "

      - name: Build with PyInstaller
        run: pyinstaller boneglaive.spec --distpath dist\windows

      - name: Verify Cairo DLLs were bundled
        run: |
          $bundleDir = "dist\windows\boneglaive"
          $required = @('libcairo-2.dll', 'libpixman-1-0.dll', 'libfreetype-6.dll')
          $missing = @()
          foreach ($dll in $required) {
            if (Test-Path "$bundleDir\$dll") {
              Write-Host "Bundled OK: $dll"
            } else {
              $missing += $dll
              Write-Host "NOT BUNDLED: $dll"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Cairo DLLs missing from bundle: $($missing -join ', ')"
            exit 1
          }

      - name: Package artifact
        run: |
          Compress-Archive -Path dist\windows\boneglaive\* -DestinationPath boneglaive-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boneglaive-windows
          path: boneglaive-windows.zip

  build-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '14.2'
          shell: sh
          run: |
            set -ex
            sudo pkg install -y \
              python311 \
              py311-pip \
              cairo \
              pkgconf \
              sdl2 \
              sdl2_mixer \
              sdl2_image \
              sdl2_ttf \
              zip
            python3.11 -m pip install --upgrade pip
            cd /tmp && python3.11 -m pip download --no-binary :all: --no-deps pygame
            tar xzf pygame-*.tar.gz && cd pygame-*/
            printf '' > buildconfig/Setup_Unix.in
            python3.11 -m pip install .
            cd /home/runner/work/Boneglaive/Boneglaive
            python3.11 -m pip install cairosvg cairocffi pyinstaller
            python3.11 -m pip install -e .
            python3.11 -m PyInstaller boneglaive.spec --distpath dist/freebsd
            cd dist/freebsd && zip -r ../../boneglaive-freebsd.zip boneglaive/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boneglaive-freebsd
          path: boneglaive-freebsd.zip

  release:
    name: Attach to Release
    needs: [build-linux, build-windows, build-freebsd]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            boneglaive-linux/boneglaive-linux.zip
            boneglaive-windows/boneglaive-windows.zip
            boneglaive-freebsd/boneglaive-freebsd.zip
