<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Four-Armed Dragon Masked Character with Tibetan Horns and White Hair -->

  <!-- Shadow -->
  <ellipse cx="32" cy="60" rx="14" ry="4" fill="#000000" opacity="0.2"/>

  <!-- Tibetan Longhorns (industrial piping) - Left horn -->
  <path d="M 26 18 Q 18 16 12 10" stroke="#4A4A4F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 26 18 Q 18 16 12 10" stroke="#8A8A8E" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Horn segments (industrial joints) -->
  <circle cx="22" cy="15" r="1.5" fill="#4A4A4F" stroke="#8A8A8E" stroke-width="0.5"/>
  <circle cx="16" cy="12" r="1.5" fill="#4A4A4F" stroke="#8A8A8E" stroke-width="0.5"/>

  <!-- Tibetan Longhorns - Right horn -->
  <path d="M 38 18 Q 46 16 52 10" stroke="#4A4A4F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 38 18 Q 46 16 52 10" stroke="#8A8A8E" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Horn segments -->
  <circle cx="42" cy="15" r="1.5" fill="#4A4A4F" stroke="#8A8A8E" stroke-width="0.5"/>
  <circle cx="48" cy="12" r="1.5" fill="#4A4A4F" stroke="#8A8A8E" stroke-width="0.5"/>

  <!-- Long white hair flowing from back of helmet -->
  <g opacity="0.9">
    <!-- Left hair strand -->
    <path d="M 29 18 Q 28 22 28 28" stroke="#F0F0FF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 29 18 Q 28 22 28 28" stroke="#FFFFFF" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Center hair strands -->
    <path d="M 31 18 Q 30 23 30 30" stroke="#F0F0FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 31 18 Q 30 23 30 30" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <path d="M 33 18 Q 34 23 34 30" stroke="#F0F0FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 33 18 Q 34 23 34 30" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Right hair strand -->
    <path d="M 35 18 Q 36 22 36 28" stroke="#F0F0FF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 35 18 Q 36 22 36 28" stroke="#FFFFFF" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Subtle glow effect -->
    <ellipse cx="32" cy="22" rx="5" ry="8" fill="#FFFFFF" opacity="0.15"/>
  </g>

  <!-- Legs -->
  <rect x="26" y="48" width="4" height="12" rx="1" fill="#5C4033" stroke="#3A2817" stroke-width="0.5"/>
  <rect x="34" y="48" width="4" height="12" rx="1" fill="#5C4033" stroke="#3A2817" stroke-width="0.5"/>

  <!-- Boots (bone color accents) -->
  <rect x="24" y="56" width="8" height="4" rx="1" fill="#8B7355" stroke="#E0D5C5" stroke-width="0.5"/>
  <rect x="32" y="56" width="8" height="4" rx="1" fill="#8B7355" stroke="#E0D5C5" stroke-width="0.5"/>

  <!-- Lower torso/hips (burgundy) -->
  <path d="M 32 34 L 24 36 L 24 48 L 32 48 Z" fill="#722F37" stroke="#4A1F27" stroke-width="0.5"/>
  <path d="M 32 34 L 40 36 L 40 48 L 32 48 Z" fill="#722F37" stroke="#4A1F27" stroke-width="0.5"/>

  <!-- Belt (bone color) -->
  <rect x="24" y="36" width="16" height="3" fill="#E0D5C5" stroke="#8B7355" stroke-width="0.5"/>

  <!-- Lower arms (back pair) - dark skin, coming from behind -->
  <path d="M 32 28 L 20 32 L 16 38" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 32 28 L 44 32 L 48 38" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Hands for lower arms -->
  <circle cx="16" cy="38" r="2" fill="#6B4D3D"/>
  <circle cx="48" cy="38" r="2" fill="#6B4D3D"/>
  <!-- Arm bracers/guards for lower arms (metal with bone accents) -->
  <rect x="15" y="37" width="3" height="2" fill="#4A4A4F" stroke="#E0D5C5" stroke-width="0.3"/>
  <rect x="46" y="37" width="3" height="2" fill="#4A4A4F" stroke="#E0D5C5" stroke-width="0.3"/>

  <!-- Upper torso (burgundy) -->
  <rect x="26" y="24" width="12" height="12" rx="2" fill="#722F37" stroke="#4A1F27" stroke-width="0.5"/>

  <!-- Chest panel (bone accent) -->
  <path d="M 28 26 L 36 26 L 34 30 L 30 30 Z" fill="#E0D5C5" stroke="#8B7355" stroke-width="0.5"/>

  <!-- Upper arms (front pair) - dark skin -->
  <path d="M 26 26 L 18 28 L 14 32" stroke="#5C4033" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 38 26 L 46 28 L 50 32" stroke="#5C4033" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Hands for upper arms -->
  <circle cx="14" cy="32" r="2.5" fill="#6B4D3D"/>
  <circle cx="50" cy="32" r="2.5" fill="#6B4D3D"/>

  <!-- Shoulder guards (metal) -->
  <circle cx="26" cy="26" r="3" fill="#4A4A4F" stroke="#8A8A8E" stroke-width="0.5"/>
  <circle cx="38" cy="26" r="3" fill="#4A4A4F" stroke="#8A8A8E" stroke-width="0.5"/>

  <!-- Neck (dark skin) -->
  <rect x="30" y="20" width="4" height="4" fill="#5C4033"/>

  <!-- Head (dark skin) -->
  <circle cx="32" cy="16" r="6" fill="#5C4033" stroke="#3A2817" stroke-width="0.5"/>

  <!-- Black helmet -->
  <path d="M 26 14 Q 28 10 32 10 Q 36 10 38 14 L 38 18 Q 36 16 32 16 Q 28 16 26 18 Z" fill="#1A1A1F" stroke="#0A0A0F" stroke-width="0.5"/>
  <!-- Helmet front detail -->
  <path d="M 28 12 Q 30 10 32 10 Q 34 10 36 12" stroke="#1A1A1F" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Dragon mask (covering upper face - bone colored) -->
  <path d="M 26 14 L 24 16 L 26 18 L 32 17 L 38 18 L 40 16 L 38 14 Z" fill="#E0D5C5" stroke="#8B7355" stroke-width="0.5"/>

  <!-- Dragon mask eyes (angular/fierce) -->
  <path d="M 28 15 L 30 16 L 28 17 Z" fill="#FF6B35" stroke="#8B3A1F" stroke-width="0.3"/>
  <path d="M 36 15 L 34 16 L 36 17 Z" fill="#FF6B35" stroke="#8B3A1F" stroke-width="0.3"/>

  <!-- Dragon mask horns/ridges -->
  <path d="M 26 14 L 25 12 L 26 13" fill="#8B7355" stroke="#6B5335" stroke-width="0.3"/>
  <path d="M 38 14 L 39 12 L 38 13" fill="#8B7355" stroke="#6B5335" stroke-width="0.3"/>

  <!-- Dragon mask nose ridge -->
  <path d="M 32 16 L 32 18" stroke="#8B7355" stroke-width="1" stroke-linecap="round"/>

  <!-- Dragon mask decorative scales -->
  <circle cx="28" cy="15" r="0.5" fill="#B8A88D"/>
  <circle cx="32" cy="14.5" r="0.5" fill="#B8A88D"/>
  <circle cx="36" cy="15" r="0.5" fill="#B8A88D"/>

  <!-- Lower face visible (dark skin) -->
  <path d="M 28 18 Q 32 20 36 18" fill="#5C4033"/>

  <!-- Mouth -->
  <path d="M 30 19 Q 32 20 34 19" stroke="#3A2817" stroke-width="0.5" fill="none"/>

  <!-- Arm bracers/guards for upper arms (metal with bone accents) -->
  <rect x="13" y="31" width="4" height="2" fill="#4A4A4F" stroke="#E0D5C5" stroke-width="0.3"/>
  <rect x="47" y="31" width="4" height="2" fill="#4A4A4F" stroke="#E0D5C5" stroke-width="0.3"/>

  <!-- Decorative sash/cloth (bone glow color) -->
  <path d="M 24 39 L 22 44 L 24 46" stroke="#FFAA77" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 39 L 42 44 L 40 46" stroke="#FFAA77" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
